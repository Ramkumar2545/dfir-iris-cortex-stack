# ============================================================
# DFIR-IRIS + Cortex 4.x — Single Machine Docker Stack
# RAM: 16 GB | Platform: Ubuntu 22.04/24.04
#
# Usage:
#   1. cp .env.example .env  (edit all CHANGE_ME values)
#   2. bash scripts/setup.sh
#   3. docker compose up -d
# ============================================================

services:

  # ─────────────────────────────────────────────────────────
  # IRIS Stack
  # ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: iriswebapp_rabbitmq
    restart: unless-stopped
    networks:
      - iris_backend
    deploy:
      resources:
        limits:
          memory: 512m

  db:
    image: ghcr.io/dfir-iris/iriswebapp_db:${IRIS_VERSION:-v2.4.20}
    container_name: iriswebapp_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - iris_backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-iris}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 1g

  app:
    image: ghcr.io/dfir-iris/iriswebapp_app:${IRIS_VERSION:-v2.4.20}
    container_name: iriswebapp_app
    command: ["nohup", "./iris-entrypoint.sh", "iriswebapp"]
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./certificates/rootCA/irisRootCACert.pem:/etc/irisRootCACert.pem:ro
      - ./certificates/:/home/iris/certificates/:ro
      - ./certificates/ldap/:/iriswebapp/certificates/ldap/:ro
      - iris-downloads:/home/iris/downloads
      - user_templates:/home/iris/user_templates
      - server_data:/home/iris/server_data
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - iris_backend
      - iris_frontend
    deploy:
      resources:
        limits:
          memory: 2g

  worker:
    image: ghcr.io/dfir-iris/iriswebapp_app:${IRIS_VERSION:-v2.4.20}
    container_name: iriswebapp_worker
    restart: unless-stopped
    command:
      - "./wait-for-iriswebapp.sh"
      - "app:8000"
      - "./iris-entrypoint.sh"
      - "iris-worker"
    env_file:
      - .env
    environment:
      - IRIS_WORKER=1
    volumes:
      - ./certificates/rootCA/irisRootCACert.pem:/etc/irisRootCACert.pem:ro
      - ./certificates/:/home/iris/certificates/:ro
      - ./certificates/ldap/:/iriswebapp/certificates/ldap/:ro
      - iris-downloads:/home/iris/downloads
      - user_templates:/home/iris/user_templates
      - server_data:/home/iris/server_data
    depends_on:
      - rabbitmq
      - db
      - app
    networks:
      - iris_backend
    deploy:
      resources:
        limits:
          memory: 1g

  iriswebapp_nginx:
    image: ghcr.io/dfir-iris/iriswebapp_nginx:${IRIS_VERSION:-v2.4.20}
    container_name: iriswebapp_nginx
    restart: unless-stopped
    # FIX: Do NOT pass SERVER_NAME or IRIS_UPSTREAM via env_file here.
    # The IRIS nginx image reads SERVER_NAME to build "upstream app:<port>".
    # If SERVER_NAME is blank or missing a port suffix, nginx fails with:
    #   "invalid port in upstream ':'"
    # Instead we pass only what nginx needs:
    environment:
      - IRIS_UPSTREAM_PORT=8000
      - SERVER_NAME=iriswebapp_app
    ports:
      - "${INTERFACE_HTTPS_PORT:-443}:${INTERFACE_HTTPS_PORT:-443}"
    volumes:
      - ./certificates/web_certificates/:/www/certs/:ro
    depends_on:
      - app
    networks:
      - iris_frontend
    deploy:
      resources:
        limits:
          memory: 256m

  # ─────────────────────────────────────────────────────────
  # Cortex 4.x Stack
  # ─────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: cortex_es
    restart: unless-stopped
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - cluster.name=cortex
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=100000
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx2g
    volumes:
      - cortex_es_data:/usr/share/elasticsearch/data
      - cortex_es_logs:/usr/share/elasticsearch/logs
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - cortex_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s http://localhost:9200/_cat/health || exit 1"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 3g
    memswap_limit: 3g

  cortex:
    image: thehiveproject/cortex:latest
    container_name: cortex
    restart: unless-stopped
    # user: root fixes AccessDeniedException on /tmp/cortex-jobs AND /var/log/cortex
    user: "0:0"
    environment:
      JAVA_OPTS: "-Xms1g -Xmx1g -XX:MaxMetaspaceSize=400m -XX:ReservedCodeCacheSize=256m"
      # FIX: pass ES URI as environment (do NOT rely on application.conf for this)
      # The entrypoint script reads these env vars and patches application.conf
      es_uri: http://cortex_es:9200
      job_directory: /tmp/cortex-jobs
      docker_job_directory: /tmp/cortex-jobs
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/cortex-jobs:/tmp/cortex-jobs
      # FIX 1: Remove :ro so entrypoint can chown /etc/cortex (was causing
      #   "chown: changing ownership of '/etc/cortex/application.conf': Read-only file system")
      - ./cortex/config:/etc/cortex
      # FIX 2: Mount log dir from host with open perms (pre-created by setup.sh with chmod 777)
      #   Fixes: "Permission denied" on /var/log/cortex/application.log
      - ./cortex/logs:/var/log/cortex
      - ./cortex/neurons:/opt/cortexneurons
    ports:
      - "9001:9001"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - cortex_net
      - iris_backend
    healthcheck:
      test: ["CMD-SHELL", "curl -s -f http://localhost:9001/cortex/api/status || exit 1"]
      start_period: 90s
      interval: 15s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 2g
    memswap_limit: 2g

volumes:
  db_data:
  iris-downloads:
  user_templates:
  server_data:
  cortex_es_data:
  cortex_es_logs:

networks:
  iris_backend:
    name: iris_backend
    driver: bridge
  iris_frontend:
    name: iris_frontend
    driver: bridge
  cortex_net:
    driver: bridge
