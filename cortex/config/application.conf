# Cortex 4.x application configuration
# Mounted at /etc/cortex/application.conf inside the cortex container

play.http.secret.key = "cortex-secret-change-in-production"

# Elasticsearch connection
elasticsearch {
  uri = "http://cortex_es:9200"
  index {
    name = "cortex"
    replicas = 0
    shards = 5
  }
  search {
    pagesize = 10
  }
}

# Job execution via Docker
job {
  runner = [docker, process]
  directory = /tmp/cortex-jobs
  dockerDirectory = /tmp/cortex-jobs
}

# Authentication
auth {
  provider = [local, key]
}

# Analyzers/Responders catalog
neuron {
  urls = ["https://download.thehive-project.org/analyzers.json"]
}

# HTTP binding
http {
  address = "0.0.0.0"
  port = 9001
}

# Cortex 4.x uses /cortex sub-path prefix
play.http.context = "/cortex"
