# ============================================================
# Cortex 4.x — application.conf
# Mounted (rw, NOT ro) at /etc/cortex/application.conf
# The Cortex entrypoint chowns this dir on startup — it MUST
# be writable, otherwise you get:
#   "chown: changing ownership of '/etc/cortex': Read-only file system"
# ============================================================

play.http.secret.key = "changethisinproduction-atleast32chars"

# Elasticsearch
elasticsearch {
  uri = "http://cortex_es:9200"
  index {
    name = "cortex"
    replicas = 0
    shards = 5
  }
  search {
    pagesize = 10
  }
}

# Job execution via Docker
job {
  runner = [docker, process]
  directory = /tmp/cortex-jobs
  dockerDirectory = /tmp/cortex-jobs
}

# Authentication
auth {
  provider = [local, key]
}

# Analyzers/Responders catalog
neuron {
  urls = ["https://download.thehive-project.org/analyzers.json"]
}

# HTTP binding
http {
  address = "0.0.0.0"
  port = 9001
}

# Cortex 4.x API sub-path prefix
play.http.context = "/cortex"
